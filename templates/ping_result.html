{% extends "base.html" %}
{% block content %}
<div class="card lab-card">
  <div class="card-body p-4 p-md-5">
    <h1 class="h3 mb-3">Resultado Ping</h1>
    <p><strong>Input:</strong> host={{ host }}</p>

    <h2 class="h5 mt-4">Comando ejecutado</h2>
    <div class="code-block">{{ command }}</div>

    <h2 class="h5 mt-4">Salida</h2>
    <div class="code-block">{{ output }}</div>

    <a class="btn btn-outline-dark mt-4" href="/">Volver al laboratorio</a>
  </div>
</div>
{% endblock %}
