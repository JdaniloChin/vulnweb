<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "VulnWeb Lab" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-dark: #111827;
      --brand-accent: #0ea5e9;
      --brand-warn: #f59e0b;
      --brand-bg: #f3f4f6;
    }
    body {
      background:
        radial-gradient(circle at 10% 15%, rgba(14, 165, 233, 0.2), transparent 25%),
        radial-gradient(circle at 90% 0%, rgba(245, 158, 11, 0.18), transparent 24%),
        var(--brand-bg);
      min-height: 100vh;
    }
    .navbar-brand span {
      color: var(--brand-accent);
    }
    .hero {
      background: linear-gradient(120deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.25);
    }
    .lab-card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
      animation: rise-in 0.4s ease both;
    }
    .lab-badge {
      background: #fef3c7;
      color: #92400e;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.78rem;
      letter-spacing: 0.4px;
    }
    .code-block {
      background: #0b1020;
      color: #d1d5db;
      border-radius: 0.75rem;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><span>Vuln</span>Web Lab</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4 py-md-5">
  {% block content %}{% endblock %}
</main>

<footer class="border-top bg-white">
  <div class="container py-3 text-center text-secondary small">
    Desarrollado por YaguarApps con fines educativos
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
