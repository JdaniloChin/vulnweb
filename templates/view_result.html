{% extends "base.html" %}
{% block content %}
<div class="card lab-card">
  <div class="card-body p-4 p-md-5">
    <h1 class="h3 mb-3">Resultado Lector de Archivos</h1>
    <p><strong>Input:</strong> file={{ file }}</p>

    {% if error %}
    <div class="alert alert-danger" role="alert">
      No se pudo abrir el archivo: {{ error }}
    </div>
    {% else %}
    <h2 class="h5">Contenido</h2>
    <div class="code-block">{{ content }}</div>
    {% endif %}

    <a class="btn btn-outline-dark mt-4" href="/">Volver al laboratorio</a>
  </div>
</div>
{% endblock %}
